version: '3.8'

# =============================================================================
# Docker Compose — Sapataria Web
# Apenas PostgreSQL local. Nenhuma credencial fixada em código.
# Use as variáveis do arquivo .env na raiz do projeto.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: sapataria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-sapataria}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-sapataria}
      POSTGRES_DB: ${DATABASE_NAME:-sapataria_db}
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-sapataria} -d ${DATABASE_NAME:-sapataria_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: sapataria_postgres_data
